  <circle cx="60" cy="60" r="48" fill="#10b981" fill-opacity="0.08"/>

  <!-- Ghost body -->
  <path d="M60 28C44.536 28 32 40.536 32 56v24c0 2 1.5 3 3 2l6-4c1.5-1 3.5-1 5 0l6 4c1.5 1 3.5 1 5 0l6-4c1.5-1 3.5-1 5 0l6 4c1.5 1 3 0 3-2V56c0-15.464-12.536-28-28-28z" fill="#34d399"/>

